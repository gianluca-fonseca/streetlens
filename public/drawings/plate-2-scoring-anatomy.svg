<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="Plate 2 · scoring anatomy: a street segment in plan with the audit rubric, score bins, width channel, and community casing">
  <title>StreetLens Plate 2 · Scoring anatomy (segment, bins, width channel, casing)</title>

  <defs>
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F45E53"/>
      <stop offset="50%" stop-color="#CE4D02"/>
      <stop offset="100%" stop-color="#056E48"/>
    </linearGradient>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,1.2 L8,4.5 L0,7.8" fill="none" stroke="#111111" stroke-width="1.1"/>
    </marker>
    <marker id="ar2S" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M8,1.2 L0,4.5 L8,7.8" fill="none" stroke="#111111" stroke-width="1.1"/>
    </marker>
    <marker id="dot2" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="1.7" fill="#111111"/>
    </marker>
  </defs>

  <!-- SHEET -->
  <rect x="0" y="0" width="1160" height="760" fill="#FAFAFA"/>
  <rect x="18" y="18" width="1124" height="724" fill="none" stroke="#111111" stroke-width="1.4"/>
  <rect x="30" y="30" width="1100" height="700" fill="none" stroke="#C6C6C6" stroke-width="1"/>

  <!-- LAYOUT RULE · text keep-out: keep all labels ≥24px inside the inner frame
       (safe box x 54–1106, y 54–706). Any label crossing a line or hatch gets a
       #FAFAFA halo rect behind it. Title-block cell text must clear the x=996 divider. -->

  <text x="52" y="66" font-size="20" letter-spacing="1.5" fill="#111111" font-weight="700">PLATE 2 · SCORING ANATOMY</text>
  <text x="52" y="88" font-size="12.5" letter-spacing="0.5" fill="#5C5C5C">One segment in plan. How a rubric reading becomes a color, a width, and a bin, the same way in any city.</text>
  <line x1="52" y1="102" x2="1108" y2="102" stroke="#C6C6C6" stroke-width="1"/>

  <!-- column divider -->
  <line x1="716" y1="128" x2="716" y2="612" stroke="#C6C6C6" stroke-width="1"/>

  <!-- ================= LEFT: PLAN VIEW ================= -->
  <text x="60" y="150" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">A · SEGMENT IN PLAN</text>

  <!-- cross-street stubs (intersections A & B) -->
  <g fill="#F1F1F1" stroke="#C6C6C6" stroke-width="1">
    <rect x="132" y="164" width="36" height="150"/>
    <rect x="632" y="164" width="36" height="150"/>
  </g>
  <!-- roadway of the segment -->
  <rect x="150" y="217" width="500" height="36" fill="#ECECEC" stroke="#111111" stroke-width="1.2"/>
  <!-- sidewalk bands -->
  <rect x="168" y="200" width="464" height="14" fill="#F1F1F1" stroke="#C6C6C6" stroke-width="1"/>
  <rect x="168" y="256" width="464" height="14" fill="#F1F1F1" stroke="#C6C6C6" stroke-width="1"/>

  <!-- SCORED CENTERLINE (this segment reads FAIR / amber; width = width channel) -->
  <line x1="168" y1="235" x2="632" y2="235" stroke="#CE4D02" stroke-width="7" stroke-linecap="round"/>

  <!-- node dots -->
  <circle cx="150" cy="235" r="4" fill="#111111"/>
  <circle cx="650" cy="235" r="4" fill="#111111"/>
  <text x="150" y="332" font-size="10" fill="#5C5C5C" text-anchor="middle">NODE A</text>
  <text x="650" y="332" font-size="10" fill="#5C5C5C" text-anchor="middle">NODE B</text>

  <!-- width dim in top sidewalk (obs 2) -->
  <line x1="270" y1="207" x2="330" y2="207" stroke="#111111" stroke-width="1" marker-start="url(#ar2S)" marker-end="url(#ar2)"/>
  <text x="300" y="192" font-size="9" fill="#5C5C5C" text-anchor="middle">≥1.20 m</text>

  <!-- tree (obs 4) -->
  <line x1="460" y1="200" x2="460" y2="178" stroke="#111111" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="460" cy="170" r="12" fill="#EDEDED" stroke="#111111" stroke-width="1"/>

  <!-- crossing zebra (obs 6) -->
  <g stroke="#111111" stroke-width="2">
    <line x1="626" y1="219" x2="626" y2="251"/><line x1="632" y1="219" x2="632" y2="251"/><line x1="638" y1="219" x2="638" y2="251"/>
  </g>

  <!-- numbered observation markers -->
  <g font-size="10" font-weight="700" fill="#111111" text-anchor="middle">
    <g><circle cx="180" cy="253" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="180" y="256.5">1</text></g>
    <g><circle cx="300" cy="207" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="300" y="210.5">2</text></g>
    <g><circle cx="360" cy="253" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="360" y="256.5">3</text></g>
    <g><circle cx="460" cy="188" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="460" y="191.5">4</text></g>
    <g><circle cx="540" cy="235" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="540" y="238.5">5</text></g>
    <g><circle cx="620" cy="207" r="9" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/><text x="620" y="210.5">6</text></g>
  </g>

  <!-- observation key -->
  <text x="60" y="368" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">B · OBSERVATION POINTS (rubric v0.1)</text>
  <g font-size="10.5" fill="#111111">
    <text x="60" y="392"><tspan font-weight="700">1</tspan>  Curb ramp <tspan fill="#5C5C5C">· accessibility</tspan></text>
    <text x="60" y="414"><tspan font-weight="700">2</tspan>  Sidewalk width ≥ 1.20 m <tspan fill="#5C5C5C">· accessibility</tspan></text>
    <text x="60" y="436"><tspan font-weight="700">3</tspan>  Storm grate / inlet <tspan fill="#5C5C5C">· drainage</tspan></text>
    <text x="392" y="392"><tspan font-weight="700">4</tspan>  Tree canopy <tspan fill="#5C5C5C">· shade</tspan></text>
    <text x="392" y="414"><tspan font-weight="700">5</tspan>  Bike lane / separation <tspan fill="#5C5C5C">· bike</tspan></text>
    <text x="392" y="436"><tspan font-weight="700">6</tspan>  Crossing safety <tspan fill="#5C5C5C">· overall</tspan></text>
  </g>

  <!-- segment scorecard (product-popover style) -->
  <g>
    <rect x="60" y="468" width="600" height="132" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.2"/>
    <text x="76" y="494" font-size="12.5" font-weight="700" fill="#111111">SEGMENT esz-sa-0142</text>
    <text x="644" y="494" font-size="10.5" fill="#5C5C5C" text-anchor="end">length 118 m · demo reading</text>
    <line x1="76" y1="506" x2="644" y2="506" stroke="#C6C6C6" stroke-width="1"/>
    <g font-size="11.5">
      <text x="76" y="530" fill="#5C5C5C">OVERALL</text><text x="210" y="530" fill="#111111" font-weight="700" text-anchor="end">52</text><text x="226" y="530" fill="#5C5C5C">FAIR</text>
      <text x="76" y="552" fill="#5C5C5C">ACCESS</text><text x="210" y="552" fill="#111111" font-weight="700" text-anchor="end">44</text><text x="226" y="552" fill="#5C5C5C">POOR</text>
      <text x="76" y="574" fill="#5C5C5C">DRAIN</text><text x="210" y="574" fill="#111111" font-weight="700" text-anchor="end">61</text><text x="226" y="574" fill="#5C5C5C">GOOD</text>
      <text x="330" y="530" fill="#5C5C5C">SHADE</text><text x="440" y="530" fill="#111111" font-weight="700" text-anchor="end">38</text><text x="456" y="530" fill="#5C5C5C">POOR</text>
      <text x="330" y="552" fill="#5C5C5C">BIKE</text><text x="440" y="552" fill="#111111" font-weight="700" text-anchor="end">29</text><text x="456" y="552" fill="#5C5C5C">POOR</text>
    </g>
    <text x="330" y="574" font-size="10.5" fill="#111111">✕ fails Ley 7600 · access. 44 &lt; 50</text>
  </g>

  <!-- ================= RIGHT: SCORING LEGEND ================= -->
  <!-- C · Score scale -->
  <text x="740" y="150" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">C · SCORE SCALE · overall lens (0–100, high = good)</text>

  <!-- bin labels -->
  <g font-size="9.5" fill="#5C5C5C" text-anchor="middle">
    <text x="813" y="182">POOR</text>
    <text x="915" y="182">FAIR</text>
    <text x="983" y="182">GOOD</text>
    <text x="1050" y="182">EXCEL.</text>
  </g>
  <!-- gradient bar -->
  <rect x="745" y="190" width="340" height="22" fill="url(#ramp)" stroke="#111111" stroke-width="1"/>
  <!-- bin dividers -->
  <g stroke="#FAFAFA" stroke-width="1.5">
    <line x1="881" y1="190" x2="881" y2="212"/>
    <line x1="949" y1="190" x2="949" y2="212"/>
    <line x1="1017" y1="190" x2="1017" y2="212"/>
  </g>
  <!-- scale ticks -->
  <g stroke="#111111" stroke-width="1">
    <line x1="745" y1="212" x2="745" y2="219"/><line x1="881" y1="212" x2="881" y2="219"/>
    <line x1="949" y1="212" x2="949" y2="219"/><line x1="1017" y1="212" x2="1017" y2="219"/>
    <line x1="1085" y1="212" x2="1085" y2="219"/>
  </g>
  <g font-size="9" fill="#5C5C5C" text-anchor="middle">
    <text x="745" y="230">0</text><text x="881" y="230">40</text><text x="949" y="230">60</text><text x="1017" y="230">80</text><text x="1085" y="230">100</text>
  </g>
  <!-- Ley 7600 threshold at 50 · the ONE pink accent -->
  <line x1="915" y1="184" x2="915" y2="212" stroke="#F0268C" stroke-width="2"/>
  <path d="M915,182 l-4,-6 l8,0 z" fill="#F0268C"/>
  <text x="915" y="250" font-size="9.5" fill="#111111" text-anchor="middle" font-weight="700">Ley 7600 min = 50</text>

  <!-- D · bins table -->
  <text x="740" y="286" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">D · VALUE BINS (legend is never color-only)</text>
  <g font-size="11">
    <rect x="745" y="298" width="20" height="14" fill="#3A8861" stroke="#111111" stroke-width="0.8"/>
    <text x="776" y="309" fill="#111111" font-weight="700">EXCELLENT</text><text x="1085" y="309" fill="#5C5C5C" text-anchor="end">80–100</text>
    <rect x="745" y="320" width="20" height="14" fill="#91A056" stroke="#111111" stroke-width="0.8"/>
    <text x="776" y="331" fill="#111111" font-weight="700">GOOD</text><text x="1085" y="331" fill="#5C5C5C" text-anchor="end">60–79</text>
    <rect x="745" y="342" width="20" height="14" fill="#CE4D02" stroke="#111111" stroke-width="0.8"/>
    <text x="776" y="353" fill="#111111" font-weight="700">FAIR</text><text x="1085" y="353" fill="#5C5C5C" text-anchor="end">40–59</text>
    <rect x="745" y="364" width="20" height="14" fill="#D07438" stroke="#111111" stroke-width="0.8"/>
    <text x="776" y="375" fill="#111111" font-weight="700">POOR</text><text x="1085" y="375" fill="#5C5C5C" text-anchor="end">0–39</text>
  </g>

  <!-- E · width channel -->
  <text x="740" y="416" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">E · WIDTH CHANNEL (redundant encoding)</text>
  <g stroke="#111111" stroke-linecap="round">
    <line x1="745" y1="438" x2="885" y2="438" stroke-width="6"/>
    <line x1="745" y1="464" x2="885" y2="464" stroke-width="4.25"/>
    <line x1="745" y1="490" x2="885" y2="490" stroke-width="2.5"/>
  </g>
  <g font-size="10" fill="#111111">
    <text x="905" y="442">score 0  →  6.0 px</text>
    <text x="905" y="468">score 50 →  4.25 px</text>
    <text x="905" y="494">score 100 → 2.5 px</text>
  </g>
  <text x="745" y="516" font-size="9.5" fill="#5C5C5C">Thicker = lower score. Problems stay legible in grayscale.</text>

  <!-- F · community casing -->
  <text x="740" y="552" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">F · COMMUNITY CASING</text>
  <line x1="745" y1="574" x2="885" y2="574" stroke="#6B7069" stroke-width="3.5" stroke-dasharray="6 4.5"/>
  <text x="905" y="571" font-size="10" fill="#111111">Community (unverified)</text>
  <text x="905" y="586" font-size="8.8" fill="#5C5C5C">#6B7069 · no score until field-audited</text>

  <!-- ============ TITLE BLOCK (bottom-right) ============ -->
  <g>
    <rect x="826" y="626" width="282" height="92" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
    <line x1="826" y1="656" x2="1108" y2="656" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="996" y1="656" x2="996" y2="718" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="826" y1="688" x2="996" y2="688" stroke="#C6C6C6" stroke-width="1"/>
    <text x="838" y="648" font-size="12.5" fill="#111111" font-weight="700" letter-spacing="0.6">SCORING ANATOMY · LEGEND</text>
    <text x="838" y="676" font-size="9.5" fill="#5C5C5C">StreetLens · Escazú pilot</text>
    <text x="838" y="708" font-size="9.5" fill="#5C5C5C">Sealed ramp, bins, widths</text>
    <text x="1008" y="676" font-size="9" fill="#9A9A9A">SCALE</text>
    <text x="1008" y="690" font-size="11" fill="#111111" font-weight="700">NTS</text>
    <text x="1008" y="710" font-size="11" fill="#111111" font-weight="700">SHEET 2/3</text>
  </g>
</svg>

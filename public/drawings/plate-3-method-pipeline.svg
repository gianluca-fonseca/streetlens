<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="Plate 3 — audit method pipeline: field audit to open data today, with the computer-vision and machine-learning path drawn as a roadmap loop that a human always verifies">
  <title>StreetLens Plate 3 — Audit method pipeline (today, and the roadmap loop)</title>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1.5 L9,5 L0,8.5" fill="none" stroke="#111111" stroke-width="1.3"/>
    </marker>
    <marker id="ar3d" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1.5 L9,5 L0,8.5" fill="none" stroke="#5C5C5C" stroke-width="1.3"/>
    </marker>
  </defs>

  <!-- SHEET -->
  <rect x="0" y="0" width="1160" height="760" fill="#FAFAFA"/>
  <rect x="18" y="18" width="1124" height="724" fill="none" stroke="#111111" stroke-width="1.4"/>
  <rect x="30" y="30" width="1100" height="700" fill="none" stroke="#C6C6C6" stroke-width="1"/>

  <text x="52" y="66" font-size="20" letter-spacing="1.5" fill="#111111" font-weight="700">PLATE 3 · METHOD PIPELINE</text>
  <text x="52" y="88" font-size="12.5" letter-spacing="0.5" fill="#5C5C5C">From a walked street to open data. The machine-learning path is a roadmap loop that a person always verifies.</text>
  <line x1="52" y1="102" x2="1108" y2="102" stroke="#C6C6C6" stroke-width="1"/>

  <!-- band labels -->
  <text x="60" y="150" font-size="11" letter-spacing="0.8" fill="#111111" font-weight="700">TODAY — the pilot from August 2026</text>
  <line x1="292" y1="146" x2="980" y2="146" stroke="#C6C6C6" stroke-width="1"/>

  <!-- ============ TODAY ROW ============ -->
  <!-- B1 FIELD AUDIT -->
  <rect x="100" y="182" width="190" height="94" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
  <text x="195" y="222" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">FIELD AUDIT</text>
  <text x="195" y="242" font-size="9.5" fill="#5C5C5C" text-anchor="middle">an auditor walks a segment,</text>
  <text x="195" y="255" font-size="9.5" fill="#5C5C5C" text-anchor="middle">answers rubric v0.1</text>

  <!-- B2 PHOTO + RUBRIC -->
  <rect x="330" y="182" width="190" height="94" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
  <text x="425" y="216" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">GEOTAGGED PHOTO</text>
  <text x="425" y="238" font-size="9.5" fill="#5C5C5C" text-anchor="middle">each image is a labeled</text>
  <text x="425" y="251" font-size="9.5" fill="#5C5C5C" text-anchor="middle">example: item + response</text>

  <!-- B3 SCORE -->
  <rect x="560" y="182" width="190" height="94" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
  <text x="655" y="216" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">RUBRIC SCORE</text>
  <text x="655" y="238" font-size="9.5" fill="#5C5C5C" text-anchor="middle">0–100 per lens, versioned,</text>
  <text x="655" y="251" font-size="9.5" fill="#5C5C5C" text-anchor="middle">published with its formula</text>

  <!-- B4 OPEN MAP -->
  <rect x="790" y="182" width="190" height="94" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
  <text x="885" y="216" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">OPEN MAP + DATA</text>
  <text x="885" y="238" font-size="9.5" fill="#5C5C5C" text-anchor="middle">public map, GeoJSON / CSV,</text>
  <text x="885" y="251" font-size="9.5" fill="#5C5C5C" text-anchor="middle">geometry back to OSM</text>

  <!-- today arrows (solid) -->
  <g stroke="#111111" stroke-width="1.5" fill="none">
    <line x1="290" y1="229" x2="328" y2="229" marker-end="url(#ar3)"/>
    <line x1="520" y1="229" x2="558" y2="229" marker-end="url(#ar3)"/>
    <line x1="750" y1="229" x2="788" y2="229" marker-end="url(#ar3)"/>
  </g>

  <!-- ============ ROADMAP LOOP ============ -->
  <text x="60" y="360" font-size="11" letter-spacing="0.8" fill="#5C5C5C" font-weight="700">ON THE ROADMAP — every audit trains the next one</text>
  <line x1="452" y1="356" x2="980" y2="356" stroke="#C6C6C6" stroke-width="1"/>

  <!-- CORPUS cylinder (under B2) -->
  <g>
    <path d="M330,404 a95,14 0 0 0 190,0 l0,54 a95,14 0 0 1 -190,0 Z" fill="#F1F1F1" stroke="#111111" stroke-width="1.2"/>
    <ellipse cx="425" cy="404" rx="95" ry="14" fill="#FFFFFF" stroke="#111111" stroke-width="1.2"/>
    <text x="425" y="438" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">LABELED IMAGERY</text>
    <text x="425" y="453" font-size="9.5" fill="#5C5C5C" text-anchor="middle">CORPUS (grows each audit)</text>
  </g>
  <!-- photo -> corpus (dashed down) -->
  <line x1="425" y1="278" x2="425" y2="388" stroke="#5C5C5C" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar3d)"/>
  <text x="435" y="330" font-size="9" fill="#5C5C5C">photos accumulate</text>

  <!-- CV / ML MODEL (dashed box, roadmap) -->
  <rect x="100" y="540" width="230" height="94" rx="4" fill="#FFFFFF" stroke="#5C5C5C" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="215" y="574" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">CV / ML MODEL</text>
  <text x="215" y="595" font-size="9" letter-spacing="1" fill="#5C5C5C" text-anchor="middle">[ ROADMAP · NOT BUILT ]</text>
  <text x="215" y="614" font-size="9.5" fill="#5C5C5C" text-anchor="middle">reads condition from a photo</text>

  <!-- PROPOSED SCORE (dashed) -->
  <rect x="380" y="540" width="200" height="94" rx="4" fill="#FFFFFF" stroke="#5C5C5C" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="480" y="580" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">PROPOSED SCORE</text>
  <text x="480" y="602" font-size="9.5" fill="#5C5C5C" text-anchor="middle">a faster first pass,</text>
  <text x="480" y="615" font-size="9.5" fill="#5C5C5C" text-anchor="middle">never the final word</text>

  <!-- HUMAN VERIFY (solid — required; pink accent) -->
  <rect x="630" y="540" width="200" height="94" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <rect x="630" y="540" width="6" height="94" fill="#F0268C"/>
  <text x="736" y="580" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">HUMAN VERIFY</text>
  <text x="736" y="602" font-size="9.5" fill="#5C5C5C" text-anchor="middle">a person confirms every</text>
  <text x="736" y="615" font-size="9.5" fill="#5C5C5C" text-anchor="middle">reading before it counts</text>

  <!-- corpus -> model (dashed dogleg left) -->
  <path d="M425,472 L425,512 L215,512 L215,538" fill="none" stroke="#5C5C5C" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar3d)"/>
  <line x1="330" y1="587" x2="378" y2="587" stroke="#5C5C5C" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar3d)" fill="none"/>
  <line x1="580" y1="587" x2="628" y2="587" stroke="#5C5C5C" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar3d)" fill="none"/>

  <!-- verify -> back up into the map (SOLID: verified reading is real) -->
  <path d="M830,587 L900,587 L900,290 L885,290" fill="none" stroke="#111111" stroke-width="1.6" marker-end="url(#ar3)"/>
  <text x="912" y="440" font-size="9.5" fill="#111111">verified reading</text>
  <text x="912" y="454" font-size="9.5" fill="#111111">enters the map</text>

  <!-- source-of-truth note -->
  <text x="60" y="672" font-size="10.5" fill="#111111" font-weight="700">Field audits are the source of truth.</text>
  <text x="60" y="690" font-size="10" fill="#5C5C5C">No model scores a street today. When one does, a person still verifies what it reports.</text>

  <!-- legend -->
  <g>
    <line x1="60" y1="712" x2="96" y2="712" stroke="#111111" stroke-width="1.6"/>
    <text x="104" y="716" font-size="9.5" fill="#5C5C5C">in the pilot today</text>
    <line x1="250" y1="712" x2="286" y2="712" stroke="#5C5C5C" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="294" y="716" font-size="9.5" fill="#5C5C5C">on the roadmap</text>
  </g>

  <!-- ============ TITLE BLOCK ============ -->
  <g>
    <rect x="826" y="626" width="282" height="92" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
    <line x1="826" y1="656" x2="1108" y2="656" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="996" y1="656" x2="996" y2="718" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="826" y1="688" x2="996" y2="688" stroke="#C6C6C6" stroke-width="1"/>
    <text x="838" y="648" font-size="12.5" fill="#111111" font-weight="700" letter-spacing="0.6">AUDIT METHOD · PIPELINE</text>
    <text x="838" y="676" font-size="9.5" fill="#5C5C5C">StreetLens · Escazú pilot</text>
    <text x="838" y="708" font-size="9.5" fill="#5C5C5C">Human-in-the-loop, always</text>
    <text x="1008" y="676" font-size="9" fill="#9A9A9A">SCALE</text>
    <text x="1008" y="690" font-size="11" fill="#111111" font-weight="700">NTS</text>
    <text x="1008" y="710" font-size="11" fill="#111111" font-weight="700">SHEET 3/3</text>
  </g>
</svg>

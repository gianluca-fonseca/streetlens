<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="Plate 1 — street right-of-way cross-section with Ley 7600 dimensions and the four StreetLens lenses annotated">
  <title>StreetLens Plate 1 — Street right-of-way cross-section (Escazú pilot)</title>

  <!-- ================= DEFS ================= -->
  <defs>
    <pattern id="earth" width="12" height="12" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#C6C6C6" stroke-width="1"/>
    </pattern>
    <pattern id="base" width="9" height="9" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#D2D2D2" stroke-width="1"/>
    </pattern>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,1.2 L8,4.5 L0,7.8" fill="none" stroke="#111111" stroke-width="1.1"/>
    </marker>
    <marker id="arS" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M8,1.2 L0,4.5 L8,7.8" fill="none" stroke="#111111" stroke-width="1.1"/>
    </marker>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="1.7" fill="#111111"/>
    </marker>
  </defs>

  <!-- ================= SHEET ================= -->
  <rect x="0" y="0" width="1160" height="760" fill="#FAFAFA"/>
  <rect x="18" y="18" width="1124" height="724" fill="none" stroke="#111111" stroke-width="1.4"/>
  <rect x="30" y="30" width="1100" height="700" fill="none" stroke="#C6C6C6" stroke-width="1"/>

  <!-- sheet header -->
  <text x="52" y="66" font-size="20" letter-spacing="1.5" fill="#111111" font-weight="700">PLATE 1 · STREET SECTION</text>
  <text x="52" y="88" font-size="12.5" letter-spacing="0.5" fill="#5C5C5C">Typical residential right-of-way. What the four lenses measure, mapped onto the built section.</text>
  <line x1="52" y1="102" x2="1108" y2="102" stroke="#C6C6C6" stroke-width="1"/>

  <!-- ============ TITLE BLOCK (top-right) ============ -->
  <g>
    <rect x="826" y="120" width="282" height="92" fill="#FFFFFF" stroke="#111111" stroke-width="1.3"/>
    <line x1="826" y1="150" x2="1108" y2="150" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="996" y1="150" x2="996" y2="212" stroke="#C6C6C6" stroke-width="1"/>
    <line x1="826" y1="182" x2="996" y2="182" stroke="#C6C6C6" stroke-width="1"/>
    <text x="838" y="142" font-size="12.5" fill="#111111" font-weight="700" letter-spacing="0.6">STREET RIGHT-OF-WAY · SECTION</text>
    <text x="838" y="170" font-size="9.5" fill="#5C5C5C">StreetLens · Escazú pilot</text>
    <text x="838" y="202" font-size="9.5" fill="#5C5C5C">Dims: Ley 7600, Arts. 125–127</text>
    <text x="1008" y="170" font-size="9" fill="#9A9A9A">SCALE</text>
    <text x="1008" y="184" font-size="11" fill="#111111" font-weight="700">NTS</text>
    <text x="1008" y="204" font-size="11" fill="#111111" font-weight="700">SHEET 1/3</text>
  </g>

  <!-- ================= SECTION GEOMETRY =================
       Grade line (road surface) y = 512. x layout:
       PL=118 | sidewalk 118-358 (1.20m) | planting 358-456 | curb 456-470 |
       gutter 470-500 | bike 500-700 | travel 700-1000 | roadway edge 1040 | CL 1000 -->

  <!-- sub-grade wedge -->
  <path d="M118,560 L1040,560 L1040,600 L118,600 Z" fill="url(#earth)" stroke="none"/>
  <line x1="118" y1="560" x2="1040" y2="560" stroke="#111111" stroke-width="1.2"/>

  <!-- roadway body -->
  <path d="M500,512 L1040,512 L1040,560 L500,560 Z" fill="url(#base)" stroke="#111111" stroke-width="1.3"/>
  <line x1="500" y1="512" x2="1040" y2="512" stroke="#111111" stroke-width="1.6"/>
  <!-- lane line between bike lane and travel lane -->
  <line x1="700" y1="512" x2="700" y2="528" stroke="#111111" stroke-width="1.4"/>

  <!-- gutter / channel (cuneta) -->
  <path d="M470,486 L500,512 L500,560 L470,560 Z" fill="#ECECEC" stroke="#111111" stroke-width="1.3"/>
  <path d="M470,486 L500,512" fill="none" stroke="#111111" stroke-width="1.6"/>

  <!-- curb (cordón) -->
  <path d="M456,482 L470,482 L470,560 L456,560 Z" fill="#E4E4E4" stroke="#111111" stroke-width="1.3"/>

  <!-- sidewalk + planting sub-base -->
  <path d="M118,600 L456,600 L456,486 L118,490 Z" fill="#F1F1F1" stroke="none"/>
  <path d="M358,486 L456,482 L456,486 L358,490 Z" fill="#E8E8E8" stroke="#111111" stroke-width="1.1"/>
  <!-- sidewalk surface — 3% cross slope toward the gutter -->
  <path d="M118,490 L358,486" fill="none" stroke="#111111" stroke-width="1.8"/>
  <line x1="118" y1="490" x2="118" y2="600" stroke="#111111" stroke-width="1.3"/>

  <!-- property line -->
  <line x1="118" y1="230" x2="118" y2="620" stroke="#111111" stroke-width="1" stroke-dasharray="7 5"/>
  <text x="126" y="250" font-size="10.5" letter-spacing="0.6" fill="#5C5C5C">PROPERTY LINE</text>
  <text x="126" y="264" font-size="9.5" letter-spacing="0.6" fill="#9A9A9A">LÍNEA DE PROPIEDAD</text>

  <!-- centerline -->
  <line x1="1000" y1="470" x2="1000" y2="560" stroke="#111111" stroke-width="1" stroke-dasharray="14 5 3 5"/>
  <text x="1000" y="458" font-size="10" letter-spacing="0.6" fill="#5C5C5C" text-anchor="middle">CL</text>

  <!-- ===== TREE + CANOPY (shade zone) ===== -->
  <line x1="405" y1="486" x2="405" y2="300" stroke="#111111" stroke-width="2.4" stroke-linecap="round"/>
  <ellipse cx="405" cy="252" rx="152" ry="72" fill="#EDEDED" stroke="#111111" stroke-width="1.2"/>
  <path d="M268,225 Q300,180 345,205 M360,190 Q405,158 452,190 M468,205 Q512,182 542,222"
        fill="none" stroke="#111111" stroke-width="1" opacity="0.55"/>
  <!-- shade drop rays -->
  <g stroke="#C6C6C6" stroke-width="1" stroke-dasharray="2 6">
    <line x1="300" y1="322" x2="300" y2="486"/>
    <line x1="360" y1="322" x2="360" y2="486"/>
    <line x1="460" y1="322" x2="460" y2="482"/>
    <line x1="520" y1="316" x2="520" y2="512"/>
  </g>

  <!-- ===== BIKE symbol ===== -->
  <g stroke="#111111" stroke-width="1.5" fill="none" transform="translate(600 498)">
    <circle cx="-16" cy="6" r="7"/>
    <circle cx="16" cy="6" r="7"/>
    <path d="M-16,6 L-4,-6 L10,-6 L16,6 M-4,-6 L2,6 L-16,6 M10,-6 L6,-9 L14,-9" stroke-linejoin="round"/>
  </g>

  <!-- ===== OVERHEAD SIGN + clearance ===== -->
  <line x1="470" y1="482" x2="470" y2="360" stroke="#111111" stroke-width="1.6"/>
  <rect x="470" y="342" width="78" height="28" fill="#F1F1F1" stroke="#111111" stroke-width="1.3"/>
  <line x1="470" y1="370" x2="548" y2="370" stroke="#111111" stroke-width="1.3"/>
  <line x1="548" y1="370" x2="548" y2="512" stroke="#111111" stroke-width="1" marker-start="url(#arS)" marker-end="url(#ar)"/>
  <text x="558" y="437" font-size="11" fill="#111111">≥ 2.20 m</text>
  <text x="558" y="451" font-size="9" fill="#9A9A9A">clearance · Art. 127</text>

  <!-- ============ VERTICAL DIMENSION — curb height (to the right) ============ -->
  <g stroke="#111111" stroke-width="1">
    <line x1="1046" y1="486" x2="1046" y2="512" marker-start="url(#arS)" marker-end="url(#ar)"/>
    <line x1="470" y1="486" x2="1052" y2="486" stroke="#C6C6C6" stroke-dasharray="3 4"/>
    <line x1="500" y1="512" x2="1052" y2="512" stroke="#C6C6C6" stroke-dasharray="3 4"/>
  </g>
  <text x="1040" y="482" font-size="10.5" fill="#111111" text-anchor="end">0.15–0.25 m</text>
  <text x="1040" y="507" font-size="8.8" fill="#9A9A9A" text-anchor="end">curb · Art. 125</text>

  <!-- ============ HORIZONTAL DIMENSION ROW (y=636) ============ -->
  <g stroke="#C6C6C6" stroke-width="1" stroke-dasharray="3 4">
    <line x1="118" y1="600" x2="118" y2="648"/>
    <line x1="358" y1="490" x2="358" y2="648"/>
    <line x1="456" y1="486" x2="456" y2="648"/>
    <line x1="500" y1="560" x2="500" y2="648"/>
    <line x1="700" y1="528" x2="700" y2="648"/>
    <line x1="1000" y1="560" x2="1000" y2="648"/>
  </g>

  <!-- sidewalk 1.20 m -->
  <line x1="118" y1="636" x2="358" y2="636" stroke="#111111" stroke-width="1.1" marker-start="url(#arS)" marker-end="url(#ar)"/>
  <text x="238" y="628" font-size="11.5" fill="#111111" text-anchor="middle" font-weight="700">≥ 1.20 m</text>
  <text x="238" y="663" font-size="9.5" fill="#5C5C5C" text-anchor="middle">SIDEWALK · ACERA</text>

  <!-- planting -->
  <line x1="358" y1="636" x2="456" y2="636" stroke="#111111" stroke-width="1.1" marker-start="url(#arS)" marker-end="url(#ar)"/>
  <text x="407" y="663" font-size="9" fill="#5C5C5C" text-anchor="middle">PLANTING</text>

  <!-- bike lane -->
  <line x1="500" y1="636" x2="700" y2="636" stroke="#111111" stroke-width="1.1" marker-start="url(#arS)" marker-end="url(#ar)"/>
  <text x="600" y="628" font-size="10.5" fill="#111111" text-anchor="middle">bike lane</text>
  <text x="600" y="663" font-size="9" fill="#5C5C5C" text-anchor="middle">CICLOVÍA</text>

  <!-- travel lane -->
  <line x1="700" y1="636" x2="1000" y2="636" stroke="#111111" stroke-width="1.1" marker-start="url(#arS)" marker-end="url(#ar)"/>
  <text x="850" y="628" font-size="10.5" fill="#111111" text-anchor="middle">travel lane · calzada</text>
  <text x="850" y="663" font-size="9" fill="#5C5C5C" text-anchor="middle">TO CENTERLINE</text>

  <!-- gutter leader -->
  <line x1="485" y1="536" x2="485" y2="690" stroke="#111111" stroke-width="1" marker-start="url(#dot)"/>
  <text x="485" y="706" font-size="9" fill="#5C5C5C" text-anchor="middle">GUTTER / CUNETA</text>

  <!-- ============ LENS LEADER ANNOTATIONS ============ -->
  <!-- ACCESSIBILITY (pink audited-reading node — the ONE accent) -->
  <circle cx="200" cy="488" r="4.6" fill="#F0268C"/>
  <line x1="200" y1="483" x2="200" y2="440" stroke="#111111" stroke-width="1" marker-end="url(#dot)"/>
  <text x="200" y="432" font-size="10.5" letter-spacing="0.8" fill="#111111" text-anchor="middle" font-weight="700">ACCESSIBILITY</text>
  <text x="200" y="418" font-size="9" fill="#5C5C5C" text-anchor="middle">width · surface · ramp · obstruction</text>
  <text x="300" y="478" font-size="9.5" fill="#5C5C5C" text-anchor="middle">cross slope ≤ 3%</text>

  <!-- SHADE -->
  <text x="405" y="176" font-size="10.5" letter-spacing="0.8" fill="#111111" text-anchor="middle" font-weight="700">SHADE</text>
  <text x="405" y="162" font-size="9" fill="#5C5C5C" text-anchor="middle">canopy · cover · exposure</text>

  <!-- DRAINAGE -->
  <line x1="500" y1="524" x2="500" y2="586" stroke="#111111" stroke-width="1" marker-end="url(#dot)"/>
  <text x="500" y="604" font-size="10.5" letter-spacing="0.8" fill="#111111" text-anchor="middle" font-weight="700">DRAINAGE</text>
  <text x="620" y="604" font-size="9" fill="#5C5C5C" text-anchor="middle">grate · slope · ponding</text>

  <!-- BIKE -->
  <line x1="600" y1="516" x2="670" y2="516" stroke="#111111" stroke-width="1" marker-end="url(#dot)"/>
  <text x="678" y="519" font-size="10.5" letter-spacing="0.8" fill="#111111" font-weight="700">BIKE</text>
  <text x="720" y="519" font-size="9" fill="#5C5C5C">lane · separation · connectivity</text>
</svg>

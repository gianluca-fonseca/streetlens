<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StreetLens map renders — QA contact sheet</title>
<style>
  :root { color-scheme: light; }
  body { margin: 0; padding: 32px; background: #f4f1ea; color: #2a2a24;
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  p.sub { margin: 0 0 24px; color: #6b675c; }
  .grid { display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  figure { margin: 0; }
  .frame { border: 1px solid #d8d3c6; border-radius: 8px; overflow: hidden;
    background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .frame img { display: block; width: 100%; height: auto; }
  figcaption { margin-top: 8px; font-family: ui-monospace, monospace;
    font-size: 12px; color: #4a473f; display: flex; justify-content: space-between; }
  figcaption span { color: #918c7e; }
</style>
</head>
<body>
  <h1>StreetLens map renders — QA contact sheet</h1>
  <p class="sub">8 generated SVGs from public/render/. Real Escazú geometry, real mapConfig ramps.</p>
  <div class="grid">
<figure><div class="frame"><img src="./lens-overall.svg" alt="lens-overall.svg" loading="lazy"/></div><figcaption>lens-overall.svg <span>107.3 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./lens-accessibility.svg" alt="lens-accessibility.svg" loading="lazy"/></div><figcaption>lens-accessibility.svg <span>107.4 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./lens-drainage.svg" alt="lens-drainage.svg" loading="lazy"/></div><figcaption>lens-drainage.svg <span>107.4 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./lens-shade.svg" alt="lens-shade.svg" loading="lazy"/></div><figcaption>lens-shade.svg <span>107.4 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./lens-bike.svg" alt="lens-bike.svg" loading="lazy"/></div><figcaption>lens-bike.svg <span>107.4 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./atlas-wide.svg" alt="atlas-wide.svg" loading="lazy"/></div><figcaption>atlas-wide.svg <span>111.6 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./atlas-dark.svg" alt="atlas-dark.svg" loading="lazy"/></div><figcaption>atlas-dark.svg <span>111.6 KB</span></figcaption></figure>
<figure><div class="frame"><img src="./district-san-antonio.svg" alt="district-san-antonio.svg" loading="lazy"/></div><figcaption>district-san-antonio.svg <span>107.3 KB</span></figcaption></figure>
  </div>
</body>
</html>
